<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Oops! Something Went Wrong</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --pink: #ec4899;
      --purple: #8b5cf6;
      --blue: #3b82f6;
      --yellow: #facc15;
      --dark: #111827;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    .card {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 40px;
      max-width: 900px;
      width: 90%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .text h1 {
      font-size: 4rem;
      color: var(--yellow);
      margin-bottom: 10px;
    }

    .text h2 {
      font-size: 1.8rem;
      margin-bottom: 15px;
    }

    .text p {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    .text span {
      color: var(--yellow);
      font-weight: bold;
    }

    .buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .buttons button {
      border: none;
      padding: 12px 22px;
      border-radius: 30px;
      font-size: 0.95rem;
      cursor: pointer;
      background: white;
      color: var(--dark);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .buttons button:hover {
      transform: scale(1.05);
      background: var(--yellow);
    }

    .image img {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      animation: wiggle 3s infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(2deg); }
      75% { transform: rotate(-2deg); }
    }

    footer {
      position: absolute;
      bottom: 15px;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .card {
        grid-template-columns: 1fr;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="text">
      <h1>404</h1>
      <h2>Uh-oh! Page Not Found</h2>
      <p>
        Looks like you wandered into the void 🌌<br>
        Don’t worry, <span>Dikshit Rathi</span> is already thinking about fixing this!
      </p>

      <div class="buttons">
        <button onclick="goHome()">🏠 Go Home</button>
        <button onclick="refreshPage()">🔄 Try Again</button>
        <button onclick="randomMessage()">🎲 Surprise Me</button>
      </div>
    </div>

    <div class="image">
      <img src="https://images.unsplash.com/photo-1525182008055-f88b95ff7980" alt="Lost Astronaut">
    </div>
  </div>

  <footer>
    Crafted with ❤️ by Dikshit Rathi
  </footer>

  <script>
    function goHome() {
      window.location.href = "index.html";
    }

    function refreshPage() {
      location.reload();
    }

    function randomMessage() {
      const messages = [
        "Even the best developers get 404s 😄",
        "This page is on a coffee break ☕",
        "Oops! The internet tripped over a cable 🔌",
        "Error found. Motivation not lost 💪"
      ];
      alert(messages[Math.floor(Math.random() * messages.length)]);
    }
  </script>

</body>
</html>
